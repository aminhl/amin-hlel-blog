<header class="mb-8">
  <nav aria-label="Breadcrumb" class="mb-4 text-sm text-muted-foreground">
    <a routerLink="/" class="hover:text-foreground hover:underline">
      Home
    </a>
    <span aria-hidden="true" class="mx-2">/</span>
    <a routerLink="/blog" class="hover:text-foreground hover:underline">
      Blog
    </a>
  </nav>

  <h1 class="text-3xl font-bold tracking-tight text-foreground sm:text-4xl md:text-5xl">
    {{ post().title }}
  </h1>

  <p class="mt-4 text-base leading-7 text-muted-foreground sm:text-lg">
    {{ post().description }}
  </p>

  <footer class="mt-4 flex flex-wrap items-center gap-x-2 gap-y-1 text-sm text-muted-foreground">
    <time [attr.datetime]="post().publishedAt">
      {{ post().publishedAt }}
    </time>

    <span aria-hidden="true">·</span>

    <span>
      <span class="sr-only">Reading time:</span>
      {{ post().readingTime }}
    </span>
    <span aria-hidden="true">·</span>
    <span>{{ post().author.name }}</span>
  </footer>

  @if (post().tags.length > 0) {
    <ul class="mt-4 flex flex-wrap gap-2" aria-label="Article tags">
      @for (tag of post().tags; track tag) {
        <li class="rounded-full border border-border bg-card px-3 py-1 text-xs text-muted-foreground">
          {{ tag }}
        </li>
      }
    </ul>
  }

</header>
