<section class="mx-auto flex min-h-[45vh] w-full max-w-2xl items-center justify-center px-4 py-16 text-center">
  <article class="rounded-2xl border border-border bg-card p-8 text-card-foreground shadow-sm sm:p-10">
    <p class="text-sm font-medium uppercase tracking-[0.2em] text-muted-foreground">
      Coming soon
    </p>

    <h1 class="mt-4 text-3xl font-bold tracking-tight text-foreground sm:text-4xl">
      {{ title() }}
    </h1>

    <p class="mt-4 text-sm leading-7 text-muted-foreground sm:text-base">
      {{ description() }}
    </p>

    <a
      routerLink="/"
      class="mt-8 inline-flex rounded-lg border border-border px-4 py-2 text-sm font-medium text-foreground transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
    >
      Back to home
    </a>
  </article>
</section>
